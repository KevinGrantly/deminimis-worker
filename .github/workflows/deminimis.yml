name: Deminimis Scraper

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Sync job ID"
        required: true
      customer_id:
        description: "Customer ID"
        required: true
      kvk:
        description: "KVK number"
        required: true
      company_name:
        description: "Company name"
        required: false
      callback_url:
        description: "Callback URL"
        required: true
      callback_token:
        description: "Callback token"
        required: true
      callback_csrf_token:
        description: "Callback CSRF token"
        required: true
      source_url:
        description: "Source URL"
        required: false
      country:
        description: "Country"
        required: false
      timeout_ms:
        description: "Timeout in ms"
        required: false
      user_agent:
        description: "User agent"
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          CALLBACK_URL: ${{ github.event.inputs.callback_url }}
          CALLBACK_TOKEN: ${{ github.event.inputs.callback_token }}
          CALLBACK_CSRF_TOKEN: ${{ github.event.inputs.callback_csrf_token }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          CUSTOMER_ID: ${{ github.event.inputs.customer_id }}
          KVK: ${{ github.event.inputs.kvk }}
          COMPANY_NAME: ${{ github.event.inputs.company_name }}
          SOURCE_URL: ${{ github.event.inputs.source_url }}
          COUNTRY: ${{ github.event.inputs.country }}
          TIMEOUT_MS: ${{ github.event.inputs.timeout_ms }}
          USER_AGENT: ${{ github.event.inputs.user_agent }}
        run: node .github/scripts/run-dispatch.mjs
